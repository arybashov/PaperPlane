<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaperPlane — Аэродинамика бумажного самолётика</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a12;
            color: #e0e0e0;
            overflow: hidden;
            height: 100vh;
            display: flex;
        }

        /* Sidebar */
        #sidebar {
            width: 300px;
            min-width: 300px;
            background: linear-gradient(180deg, #12121a 0%, #0d0d14 100%);
            border-right: 1px solid rgba(255,255,255,0.05);
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        #sidebar::-webkit-scrollbar {
            width: 6px;
        }
        #sidebar::-webkit-scrollbar-track {
            background: transparent;
        }
        #sidebar::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 8px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #e94560, #ff6b81);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transform: rotate(-15deg);
        }

        .logo h1 {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            margin: 0;
        }

        .logo span {
            font-size: 11px;
            color: #666;
            display: block;
            margin-top: 2px;
        }

        .section-title {
            font-size: 10px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 12px 0 6px;
            font-weight: 600;
        }

        .control-group {
            background: rgba(255,255,255,0.02);
            border-radius: 8px;
            padding: 10px 12px;
            border: 1px solid rgba(255,255,255,0.04);
            transition: all 0.2s;
        }

        .control-group:hover {
            background: rgba(255,255,255,0.04);
            border-color: rgba(255,255,255,0.08);
        }

        .control-group label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
        }

        .control-group label span.value {
            color: #4ecca3;
            font-weight: 600;
            font-family: 'SF Mono', 'Consolas', monospace;
            font-size: 13px;
        }

        input[type="range"] {
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: rgba(255,255,255,0.08);
            outline: none;
            -webkit-appearance: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #4ecca3;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(78, 204, 163, 0.4);
            transition: transform 0.15s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        select {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            background: #1a1a24;
            color: #e0e0e0;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
        }

        select:hover {
            background: #222230;
            border-color: rgba(255,255,255,0.2);
        }

        select:focus {
            border-color: #4ecca3;
            box-shadow: 0 0 0 2px rgba(78, 204, 163, 0.15);
        }

        select option {
            background: #1a1a24;
            color: #e0e0e0;
            padding: 10px;
            font-size: 13px;
        }

        select option:checked {
            background: #4ecca3;
            color: #000;
        }

        .btn-row {
            display: flex;
            gap: 8px;
        }

        button {
            flex: 1;
            padding: 10px 14px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button.primary {
            background: linear-gradient(135deg, #e94560, #d63850);
            color: white;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }

        button.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.4);
        }

        button.secondary {
            background: rgba(255,255,255,0.06);
            color: #aaa;
        }

        button.secondary:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        button.accent {
            background: linear-gradient(135deg, #4ecca3, #3db892);
            color: #000;
            box-shadow: 0 4px 15px rgba(78, 204, 163, 0.25);
        }

        button.accent:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(78, 204, 163, 0.35);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .stats-panel {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 14px;
            margin-top: auto;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stats-panel h3 {
            font-size: 11px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .stat-item:last-child {
            border-bottom: none;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
        }

        .stat-value {
            font-size: 14px;
            font-weight: 600;
            color: #4ecca3;
            font-family: 'SF Mono', 'Consolas', monospace;
        }

        #opt-status {
            font-size: 11px;
            color: #888;
            margin-top: 8px;
            line-height: 1.5;
            padding: 8px;
            background: rgba(78, 204, 163, 0.1);
            border-radius: 6px;
            display: none;
        }

        #opt-status.show {
            display: block;
        }

        /* 3D Container */
        #scene-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #0a0a12;
        }

        #scene-container canvas {
            display: block;
        }

        /* HUD */
        .hud {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }

        .hud-item {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 12px;
            color: #888;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .hud-item strong {
            color: #4ecca3;
            font-weight: 600;
        }

        /* Controls hint */
        .controls-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 11px;
            color: #555;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .controls-hint span {
            color: #888;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        if (typeof OrbitControls !== 'undefined' && typeof THREE.OrbitControls === 'undefined') {
            THREE.OrbitControls = OrbitControls;
        }
    </script>
</head>
<body>

<div id="sidebar">
    <div class="logo">
        <div class="logo-icon">✈</div>
        <div>
            <h1>PaperPlane</h1>
            <span>Аэродинамическая симуляция</span>
        </div>
    </div>

    <div class="section-title">Параметры запуска</div>

    <div class="control-group">
        <label>Начальная скорость <span class="value" id="val-v0">12 м/с</span></label>
        <input type="range" id="v0" min="2" max="25" step="0.5" value="12">
    </div>

    <div class="control-group">
        <label>Угол броска <span class="value" id="val-angle">15°</span></label>
        <input type="range" id="angle" min="-30" max="60" step="1" value="15">
    </div>

    <div class="control-group">
        <label>Высота броска, м <span class="value" id="val-h0">2</span></label>
        <input type="range" id="h0" min="1" max="50" step="1" value="2">
    </div>

    <div class="section-title">Аэродинамика</div>

    <div class="control-group">
        <label>Масса <span class="value" id="val-mass">5 г</span></label>
        <input type="range" id="mass" min="1" max="20" step="0.5" value="5">
    </div>

    <div class="control-group">
        <label>Площадь крыла <span class="value" id="val-area">1.0 дм²</span></label>
        <input type="range" id="area" min="0.3" max="3.0" step="0.1" value="1.0">
    </div>

    <div class="control-group">
        <label>Подъёмная сила (C<sub>L</sub>) <span class="value" id="val-cl">0.50</span></label>
        <input type="range" id="cl" min="0.1" max="1.2" step="0.05" value="0.50">
    </div>

    <div class="control-group">
        <label>Сопротивление (C<sub>D</sub>) <span class="value" id="val-cd">0.15</span></label>
        <input type="range" id="cd" min="0.05" max="0.5" step="0.01" value="0.15">
    </div>

    <div class="control-group">
        <label>Качество K = C<sub>L</sub>/C<sub>D</sub> <span class="value" id="val-k">3.33</span></label>
        <input type="range" id="k" min="1" max="10" step="0.1" value="3.33" disabled style="opacity:0.4;">
    </div>

    <div class="section-title">Конфигурация</div>

    <div class="control-group">
        <label style="margin-bottom:10px;">Форма самолётика</label>
        <select id="shape">
            <option value="custom">✏️ Своя конфигурация</option>
            <option value="dart">🎯 Стрелка (быстрый)</option>
            <option value="glider">🦅 Планер (дальний)</option>
            <option value="delta">🔺 Дельта (стабильный)</option>
        </select>
    </div>

    <div class="control-group">
        <label>Ветер <span class="value" id="val-wind">0 м/с</span></label>
        <input type="range" id="wind" min="-15" max="15" step="0.5" value="0">
    </div>

    <div class="control-group">
        <label>Турбулентность <span class="value" id="val-turb">0.5</span></label>
        <input type="range" id="turb" min="0" max="2" step="0.1" value="0.5">
    </div>

    <div class="btn-row">
        <button class="primary" id="launch">🚀 Запуск</button>
        <button class="secondary" id="clear">↺ Сброс</button>
    </div>

    <button class="accent" id="optimize" style="width:100%; margin-top:4px;">⚡ Оптимизация</button>
    <div id="opt-status"></div>

    <div class="stats-panel">
        <h3>Результаты полёта</h3>
        <div class="stat-item">
            <span class="stat-label">Дальность (X)</span>
            <span class="stat-value" id="s-distance">—</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Боковое отклонение (Z)</span>
            <span class="stat-value" id="s-zoffset">—</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Время полёта</span>
            <span class="stat-value" id="s-time">—</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Макс. высота</span>
            <span class="stat-value" id="s-hmax">—</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Конечная скорость</span>
            <span class="stat-value" id="s-vfinal">—</span>
        </div>
    </div>
</div>

<div id="scene-container">
    <div class="hud">
        <div class="hud-item">Скорость: <strong id="hud-speed">— м/с</strong></div>
        <div class="hud-item">Высота: <strong id="hud-alt">— м</strong></div>
        <div class="hud-item">Отклонение Z: <strong id="hud-z">— м</strong></div>
    </div>
    <div class="controls-hint">
        <span>🖱 ЛКМ</span> вращать · <span>🖱 ПКМ</span> двигать · <span>🖱 Колёсико</span> зум
    </div>
</div>

<script>
// ==========================================
// ФИЗИЧЕСКАЯ МОДЕЛЬ БУМАЖНОГО САМОЛЁТИКА
// ==========================================

const RHO = 1.225; // кг/м³
const G = 9.81;

let plane = null;
let trails = [];
let isRunning = false;
let lastTime = 0;

let params = {
    v0: 12,
    angle: 15,
    h0: 2,
    mass: 5,
    area: 1.0,
    CL: 0.50,
    CD: 0.15,
    wind: 0.0,
    turb: 0.5,
    shape: 'custom'
};

const SHAPES = {
    dart:  { mass:4, area:0.8, CL:0.45, CD:0.22 },
    glider: { mass:6, area:1.5, CL:0.65, CD:0.10 },
    delta:  { mass:5, area:1.2, CL:0.55, CD:0.15 }
};

// ==========================================
// THREE.JS SCENE
// ==========================================

let scene, camera, renderer, controls;
let planeMesh, trailLine, gridHelper;
let sceneInitialized = false;

function initScene() {
    if (sceneInitialized) return;
    
    const container = document.getElementById('scene-container');
    
    // Scene
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a12);
    scene.fog = new THREE.FogExp2(0x0a0a12, 0.008);
    
    // Camera
    camera = new THREE.PerspectiveCamera(55, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(25, 30, 40);
    
    // Renderer
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);
    
    // Controls
    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.maxPolarAngle = Math.PI / 2 - 0.05;
    controls.minDistance = 5;
    controls.maxDistance = 150;
    controls.target.set(15, 5, 0);
    
    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);
    
    const hemiLight = new THREE.HemisphereLight(0x4ecca3, 0x1a2f23, 0.3);
    scene.add(hemiLight);
    
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(50, 80, 30);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.near = 10;
    dirLight.shadow.camera.far = 200;
    dirLight.shadow.camera.left = -80;
    dirLight.shadow.camera.right = 80;
    dirLight.shadow.camera.top = 80;
    dirLight.shadow.camera.bottom = -80;
    scene.add(dirLight);
    
    // Ground
    const groundGeo = new THREE.PlaneGeometry(400, 400);
    const groundMat = new THREE.MeshStandardMaterial({ 
        color: 0x0d1a14,
        roughness: 0.9,
        metalness: 0.1
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);
    
    // Grid
    gridHelper = new THREE.GridHelper(200, 50, 0x1a3d2e, 0x0f1f18);
    gridHelper.position.y = 0.01;
    scene.add(gridHelper);
    
    // Distance markers
    for (let d = 0; d <= 100; d += 10) {
        const markerGeo = new THREE.PlaneGeometry(0.5, 0.5);
        const markerMat = new THREE.MeshBasicMaterial({ 
            color: 0x4ecca3, 
            transparent: true, 
            opacity: 0.6 
        });
        const marker = new THREE.Mesh(markerGeo, markerMat);
        marker.rotation.x = -Math.PI / 2;
        marker.position.set(d, 0.02, 0);
        scene.add(marker);
    }
    
    // Paper plane model
    createPlaneModel();
    
    // Trail line
    const trailGeo = new THREE.BufferGeometry();
    const trailMat = new THREE.LineBasicMaterial({ 
        color: 0x4ecca3,
        transparent: true,
        opacity: 0.8
    });
    trailLine = new THREE.Line(trailGeo, trailMat);
    scene.add(trailLine);
    
    // Old trails
    window.oldTrailLines = [];
    
    sceneInitialized = true;
}

function createPlaneModel() {
    const planeGroup = new THREE.Group();
    
    // Main body - sleek cone
    const bodyGeo = new THREE.ConeGeometry(0.25, 2, 4);
    const bodyMat = new THREE.MeshStandardMaterial({ 
        color: 0xe94560,
        roughness: 0.3,
        metalness: 0.5,
        flatShading: true
    });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.rotation.z = -Math.PI / 2;
    body.position.x = 0.5;
    body.castShadow = true;
    planeGroup.add(body);
    
    // Wings
    const wingGeo = new THREE.BoxGeometry(0.8, 0.03, 2);
    const wingMat = new THREE.MeshStandardMaterial({ 
        color: 0xff6b81,
        roughness: 0.4,
        metalness: 0.3,
        flatShading: true
    });
    const wings = new THREE.Mesh(wingGeo, wingMat);
    wings.position.set(-0.2, 0.05, 0);
    wings.castShadow = true;
    planeGroup.add(wings);
    
    // Tail vertical
    const tailGeo = new THREE.BoxGeometry(0.5, 0.5, 0.03);
    const tail = new THREE.Mesh(tailGeo, wingMat);
    tail.position.set(-1, 0.25, 0);
    tail.castShadow = true;
    planeGroup.add(tail);
    
    planeMesh = planeGroup;
    scene.add(planeMesh);
}

// ==========================================
// PHYSICS - 3D
// ==========================================

class PaperPlane {
    constructor(v0, angleDeg, h0, mass, area, CL, CD) {
        const angle = angleDeg * Math.PI / 180;
        // Начальное направление - вдоль оси X
        this.x = 0;
        this.y = h0;
        this.z = 0;
        
        // Скорость в 3D
        this.vx = v0 * Math.cos(angle);
        this.vy = v0 * Math.sin(angle);
        this.vz = 0;
        
        // Углы ориентации (для отклонения влево/вправо)
        this.yaw = 0;   // рыскание (поворот вокруг Y)
        this.pitch = angle; // тангаж
        this.roll = 0;  // крен
        
        this.m = mass / 1000;
        this.S = area / 100;
        this.CL = CL;
        this.CD = CD;
        this.trail = [{x: this.x, y: this.y, z: this.z}];
        this.t = 0;
        this.yMax = h0;
        this.landed = false;
    }

    derivatives(state) {
        const [x, y, z, vx, vy, vz] = state;
        
        // Скорость относительно воздуха с учётом ветра (ветер дует по X)
        const vxAir = vx - params.wind;
        const vyAir = vy;
        const vzAir = vz;
        const Vair = Math.sqrt(vxAir*vxAir + vyAir*vyAir + vzAir*vzAir);

        if (Vair < 0.1) return [0, 0, 0, 0, -G, 0];

        const q = 0.5 * RHO * Vair * Vair * this.S;
        const L = q * this.CL;  // подъёмная сила
        const D = q * this.CD;  // сопротивление
        
        // Направление скорости относительно воздуха
        const gammaXZ = Math.atan2(vzAir, vxAir); // угол в плоскости XZ
        const gammaXY = Math.atan2(vyAir, Math.sqrt(vxAir*vxAir + vzAir*vzAir)); // угол подъёма

        // Сопротивление - против скорости относительно воздуха
        const Dx = -D * vxAir / Vair;
        const Dy = -D * vyAir / Vair;
        const Dz = -D * vzAir / Vair;

        // Подъёмная сила - перпендикулярна скорости, направлена вверх (в плоскости скорости)
        // L направлена перпендикулярно Vair в плоскости, содержащей Vair и ось Y
        const Lx = -L * Math.sin(gammaXY) * vxAir / Math.sqrt(vxAir*vxAir + vzAir*vzAir + 0.001);
        const Ly = L * Math.cos(gammaXY);
        const Lz = -L * Math.sin(gammaXY) * vzAir / Math.sqrt(vxAir*vxAir + vzAir*vzAir + 0.001);

        // Высотная зависимость турбулентности
        // У земли (0-3м) — сильнее, на высоте (>10м) — затухает
        const heightScale = 0.3 + 2.0 * Math.exp(-y / 4.0);
        
        // Турбулентность (случайные порывы в 3D)
        let turbFx = 0, turbFy = 0, turbFz = 0;
        if (params.turb > 0) {
            const turb = params.turb * 0.1;
            const s = heightScale * turb * G * this.m;
            turbFx = (Math.random()-0.5) * s;
            turbFy = (Math.random()-0.5) * s * 0.5;
            turbFz = (Math.random()-0.5) * s;
        }

        // Локальные восходящие потоки (термики)
        if (Vair > 0.5) {
            const thermals = [
                { x: 20, z: 0, radius: 5, strength: 0.4 },
                { x: 45, z: 3, radius: 4, strength: 0.6 },
                { x: 8,  z: -2, radius: 3, strength: 0.3 }
            ];
            for (const t of thermals) {
                const dx = x - t.x;
                const dz = z - t.z;
                const dist = Math.sqrt(dx*dx + dz*dz);
                if (dist < t.radius) {
                    const factor = (1 - dist/t.radius) * t.strength;
                    turbFy += factor * G * this.m;
                }
            }
        }

        // Небольшое случайное отклонение курса (имитация неидеальной устойчивости)
        if (params.turb > 0 && Vair > 1) {
            this.yaw += (Math.random() - 0.5) * params.turb * 0.002;
        }

        const ax = (Dx + Lx + turbFx) / this.m;
        const ay = (Dy + Ly + turbFy) / this.m - G;
        const az = (Dz + Lz + turbFz) / this.m;

        return [vx, vy, vz, ax, ay, az];
    }

    step(dt) {
        if (this.landed) return;

        const state = [this.x, this.y, this.z, this.vx, this.vy, this.vz];
        
        const k1 = this.derivatives(state);
        const k2 = this.derivatives([
            state[0] + k1[0]*dt/2, state[1] + k1[1]*dt/2, state[2] + k1[2]*dt/2,
            state[3] + k1[3]*dt/2, state[4] + k1[4]*dt/2, state[5] + k1[5]*dt/2
        ]);
        const k3 = this.derivatives([
            state[0] + k2[0]*dt/2, state[1] + k2[1]*dt/2, state[2] + k2[2]*dt/2,
            state[3] + k2[3]*dt/2, state[4] + k2[4]*dt/2, state[5] + k2[5]*dt/2
        ]);
        const k4 = this.derivatives([
            state[0] + k3[0]*dt, state[1] + k3[1]*dt, state[2] + k3[2]*dt,
            state[3] + k3[3]*dt, state[4] + k3[4]*dt, state[5] + k3[5]*dt
        ]);

        this.x += (k1[0] + 2*k2[0] + 2*k3[0] + k4[0]) * dt / 6;
        this.y += (k1[1] + 2*k2[1] + 2*k3[1] + k4[1]) * dt / 6;
        this.z += (k1[2] + 2*k2[2] + 2*k3[2] + k4[2]) * dt / 6;
        this.vx += (k1[3] + 2*k2[3] + 2*k3[3] + k4[3]) * dt / 6;
        this.vy += (k1[4] + 2*k2[4] + 2*k3[4] + k4[4]) * dt / 6;
        this.vz += (k1[5] + 2*k2[5] + 2*k3[5] + k4[5]) * dt / 6;

        this.t += dt;
        if (this.y > this.yMax) this.yMax = this.y;

        if (this.y <= 0) {
            this.y = 0;
            this.landed = true;
        }

        // Записываем траекторию
        const last = this.trail[this.trail.length - 1];
        const dist = Math.sqrt((this.x - last.x)**2 + (this.y - last.y)**2 + (this.z - last.z)**2);
        if (dist > 0.3) {
            this.trail.push({x: this.x, y: this.y, z: this.z});
        }
    }

    getSpeed() {
        return Math.sqrt(this.vx*this.vx + this.vy*this.vy + this.vz*this.vz);
    }
    
    // Угол направления в плоскости XZ (для ориентации модели)
    getYaw() {
        return Math.atan2(this.vz, this.vx);
    }
    
    // Угол подъёма
    getPitch() {
        const hSpeed = Math.sqrt(this.vx*this.vx + this.vz*this.vz);
        return Math.atan2(this.vy, hSpeed);
    }
}

// ==========================================
// ANIMATION LOOP
// ==========================================

function loop(timestamp) {
    if (!lastTime) lastTime = timestamp;
    const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
    lastTime = timestamp;

    if (isRunning && plane && !plane.landed) {
        const physDt = 0.005;
        const steps = Math.max(1, Math.round(dt / physDt));
        for (let i = 0; i < steps; i++) {
            plane.step(physDt);
            if (plane.landed) {
                isRunning = false;
                updateStats();
                break;
            }
        }
        updateLiveStats();
    }

    updateScene();
    controls.update();
    renderer.render(scene, camera);
    requestAnimationFrame(loop);
}

function updateScene() {
    if (!plane || !planeMesh) return;
    
    // Update plane position в 3D
    planeMesh.position.set(plane.x, plane.y, plane.z);
    planeMesh.visible = true;
    
    // Orient plane along velocity в 3D
    if (plane.getSpeed() > 0.1) {
        const yaw = plane.getYaw();
        const pitch = plane.getPitch();
        
        planeMesh.rotation.y = -yaw;
        planeMesh.rotation.z = pitch;
        planeMesh.rotation.x = 0;
    }
    
    // Update trail в 3D
    if (plane.trail.length > 1) {
        const points = plane.trail.map(p => new THREE.Vector3(p.x, p.y, p.z));
        trailLine.geometry.setFromPoints(points);
    }
    
    // Camera follows plane smoothly
    if (isRunning) {
        controls.target.lerp(new THREE.Vector3(plane.x * 0.5, plane.y * 0.3 + 5, plane.z * 0.5), 0.02);
    }
}

function updateLiveStats() {
    if (!plane) return;
    
    document.getElementById('s-distance').textContent = plane.x.toFixed(1) + ' м';
    document.getElementById('s-zoffset').textContent = plane.z.toFixed(1) + ' м';
    document.getElementById('s-time').textContent = plane.t.toFixed(2) + ' с';
    document.getElementById('s-vfinal').textContent = plane.getSpeed().toFixed(1) + ' м/с';
    document.getElementById('s-hmax').textContent = plane.yMax.toFixed(1) + ' м';
    
    document.getElementById('hud-speed').textContent = plane.getSpeed().toFixed(1) + ' м/с';
    document.getElementById('hud-alt').textContent = plane.y.toFixed(1) + ' м';
    document.getElementById('hud-z').textContent = plane.z.toFixed(1) + ' м';
}

function updateStats() {
    updateLiveStats();
}

// ==========================================
// CONTROLS
// ==========================================

function bindSlider(id, param, suffix = '') {
    const slider = document.getElementById(id);
    const display = document.getElementById('val-' + id);
    
    slider.addEventListener('input', () => {
        params[param] = parseFloat(slider.value);
        display.textContent = params[param] + suffix;
        
        if (param === 'CL' || param === 'CD') {
            const K = params.CL / params.CD;
            document.getElementById('val-k').textContent = K.toFixed(2);
            document.getElementById('k').value = K;
        }
    });
}

bindSlider('v0', 'v0', ' м/с');
bindSlider('angle', 'angle', '°');
bindSlider('h0', 'h0', ' м');
bindSlider('mass', 'mass', ' г');
bindSlider('area', 'area', ' дм²');
bindSlider('cl', 'CL', '');
bindSlider('cd', 'CD', '');
bindSlider('wind', 'wind', ' м/с');
bindSlider('turb', 'turb', '');

document.getElementById('shape').addEventListener('change', function() {
    const shape = this.value;
    params.shape = shape;
    if (shape !== 'custom' && SHAPES[shape]) {
        const s = SHAPES[shape];
        params.mass = s.mass;
        params.area = s.area;
        params.CL = s.CL;
        params.CD = s.CD;
        
        document.getElementById('mass').value = s.mass;
        document.getElementById('area').value = s.area;
        document.getElementById('cl').value = s.CL;
        document.getElementById('cd').value = s.CD;
        
        document.getElementById('val-mass').textContent = s.mass + ' г';
        document.getElementById('val-area').textContent = s.area + ' дм²';
        document.getElementById('val-cl').textContent = s.CL.toFixed(2);
        document.getElementById('val-cd').textContent = s.CD.toFixed(2);
        
        const K = s.CL / s.CD;
        document.getElementById('val-k').textContent = K.toFixed(2);
    }
});

function launch() {
    // Store old trail
    if (plane && plane.trail.length > 1) {
        const oldGeo = new THREE.BufferGeometry();
        const oldPoints = plane.trail.map(p => new THREE.Vector3(p.x, p.y, p.z));
        oldGeo.setFromPoints(oldPoints);
        const oldMat = new THREE.LineBasicMaterial({ 
            color: 0x4ecca3, 
            transparent: true, 
            opacity: 0.2 
        });
        const oldLine = new THREE.Line(oldGeo, oldMat);
        scene.add(oldLine);
        window.oldTrailLines.push(oldLine);
        
        // Limit old trails
        if (window.oldTrailLines.length > 5) {
            const removed = window.oldTrailLines.shift();
            scene.remove(removed);
            removed.geometry.dispose();
            removed.material.dispose();
        }
    }
    
    plane = new PaperPlane(
        params.v0, params.angle, params.h0,
        params.mass, params.area, params.CL, params.CD
    );
    isRunning = true;
    lastTime = 0;
    
    // Reset trail line
    trailLine.geometry.setFromPoints([new THREE.Vector3(0, params.h0, 0)]);
}

function clearAll() {
    plane = null;
    isRunning = false;
    
    // Clear trails
    trailLine.geometry.setFromPoints([]);
    window.oldTrailLines.forEach(line => {
        scene.remove(line);
        line.geometry.dispose();
        line.material.dispose();
    });
    window.oldTrailLines = [];
    
    // Reset plane position
    if (planeMesh) {
        planeMesh.position.set(0, params.h0, 0);
        planeMesh.rotation.set(0, 0, params.angle * Math.PI / 180);
    }
    
    // Reset stats
    document.getElementById('s-distance').textContent = '—';
    document.getElementById('s-zoffset').textContent = '—';
    document.getElementById('s-time').textContent = '—';
    document.getElementById('s-vfinal').textContent = '—';
    document.getElementById('s-hmax').textContent = '—';
    document.getElementById('hud-speed').textContent = '— м/с';
    document.getElementById('hud-alt').textContent = '— м';
    document.getElementById('hud-z').textContent = '— м';
}

document.getElementById('launch').addEventListener('click', launch);
document.getElementById('clear').addEventListener('click', clearAll);

// Optimization
document.getElementById('optimize').addEventListener('click', function() {
    const status = document.getElementById('opt-status');
    status.className = 'show';
    status.textContent = '⚡ Оптимизация... 0%';
    this.disabled = true;

    const baseParams = {...params};
    let bestDist = 0, bestV0 = 0, bestAngle = 0;
    const vStart = 5, vEnd = 25, vStep = 0.5;
    const aStart = -10, aEnd = 40, aStep = 1;
    const total = ((vEnd-vStart)/vStep + 1) * ((aEnd-aStart)/aStep + 1);
    let done = 0;

    function runBatch() {
        const batchSize = 50;
        for (let b = 0; b < batchSize && done < total; b++) {
            const v0 = vStart + Math.floor(done / ((aEnd-aStart)/aStep + 1)) * vStep;
            const angle = aStart + (done % ((aEnd-aStart)/aStep + 1)) * aStep;
            done++;

            const p = new PaperPlane(v0, angle, baseParams.h0, baseParams.mass, baseParams.area, baseParams.CL, baseParams.CD);
            while (!p.landed && p.t < 30) {
                p.step(0.005);
            }
            if (p.x > bestDist) {
                bestDist = p.x;
                bestV0 = v0;
                bestAngle = angle;
            }
        }
        
        status.textContent = `⚡ Оптимизация... ${Math.round(done/total*100)}%`;
        
        if (done < total) {
            setTimeout(runBatch, 0);
        } else {
            status.innerHTML = `✓ Лучший результат: <strong style="color:#4ecca3">${bestDist.toFixed(1)} м</strong><br>` +
                `Скорость: ${bestV0.toFixed(1)} м/с · Угол: ${bestAngle}°`;
            
            document.getElementById('v0').value = bestV0;
            document.getElementById('angle').value = bestAngle;
            document.getElementById('val-v0').textContent = bestV0 + ' м/с';
            document.getElementById('val-angle').textContent = bestAngle + '°';
            params.v0 = bestV0;
            params.angle = bestAngle;
            
            launch();
            document.getElementById('optimize').disabled = false;
        }
    }
    runBatch();
});

//{}

// Resize handler
window.addEventListener('resize', () => {
    const container = document.getElementById('scene-container');
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
});

// Init
initScene();
launch();
requestAnimationFrame(loop);

</script>
